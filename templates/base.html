<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fb;
    }

    .sidebar {
      width: 260px;
      min-height: 100vh;
      background: #0f172a;
    }

    .sidebar .nav-link {
      color: #cbd5e1;
      border-radius: 10px;
      margin: 0.2rem 0;
    }

    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background: #1e293b;
      color: #fff;
    }

    .content-area {
      background: #f8fafc;
    }

    .card-dashboard {
      border: none;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .table thead th {
      background: #eef2ff;
      color: #334155;
    }
  </style>
</head>

<body>
  <div class="d-flex">
    <aside class="sidebar p-3">
      <h4 class="text-white mb-4">Delivery Seu Zé</h4>
      <nav class="nav flex-column">
        <a class="nav-link {% if active_tab == 'clientes' %}active{% endif %}" href="{% url 'clientes' %}"
          hx-get="{% url 'clientes' %}" hx-target="#content" hx-push-url="true">
          Clientes
        </a>
        <a class="nav-link {% if active_tab == 'produtos' %}active{% endif %}" href="{% url 'produtos' %}"
          hx-get="{% url 'produtos' %}" hx-target="#content" hx-push-url="true">
          Produtos
        </a>
        <a class="nav-link {% if active_tab == 'vendas' %}active{% endif %}" href="{% url 'vendas' %}"
          hx-get="{% url 'vendas' %}" hx-target="#content" hx-push-url="true">
          Vendas
        </a>
        <a class="nav-link {% if active_tab == 'analise_vendas' %}active{% endif %}" href="{% url 'analise_vendas' %}">
          Análise de Vendas
        </a>
      </nav>
    </aside>

    <main class="flex-grow-1 content-area p-4">
      <div class="card-dashboard card p-4">
        <div id="content" class="w-100">
          {% block content %}{% endblock %}
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
